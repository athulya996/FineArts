<!DOCTYPE html>
{% extends 'teacher_home.html' %}
{% load crispy_forms_filters %}
{% block content %}


<div class="row" >
    <div class="col-12 grid-margin">
        {% for message in messages %}
        <div class="alert alert-info" role="alert">
            <strong>{{message}}</strong>
        </div>
        {%endfor%}
        <div class="card">
            <div class="card-body">
                <h1 align="center">ADD RESULT</h1>

                <div class="row">
                    <div class="col-sm-12">
                        <form method="post">{% csrf_token %}
                           <div class="form-group">
                            <label class="col-form-label">Program</label>
                            <input class="form-control" type="text" value="{{program}}" readonly>
                        </div>
                        <div class="form-group">
                            <label class="col-form-label">Students</label>
                            <select name="student" class="form-control" required>
                                {% for k in students %}
                                <option value="{{k.id}}">{% for i in k.students.all %}
                                    {{forloop.counter}}.{{i.student}}
                                    {% endfor %}of group {{k.group}}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="col-form-label">Mark</label>
                            <input class="form-control" type="number" name="mark" id="number" required maxlength="10"
                                   min="0"
                                   max="10" onkeyup="clearmsg('sp1')">
                        </div>

                        <button type="submit" class="btn btn-primary mt-4 pr-4 pl-4">
                            Submit
                        </button>
                    </form>

                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
